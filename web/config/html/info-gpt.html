<p>推荐使用 DeepSeek API，价格更低且稳定。</p>
<p>GPT 工作区仅处理本地小说任务。本地小说支持日语及其他语种。</p>
<p>
  启动多个翻译器后，它们会通过共享池共同处理同一任务。每张卡的并发量是该翻译器的请求上限；实际总上限是所有已启动翻译器之和。
</p>
<p>
  停止单个翻译器会把它正在处理的分段交给其他翻译器；“停止当前任务”才会保存未完成章节并结束整项任务。混用不同模型或接口可能导致同章文风不一致。
</p>
